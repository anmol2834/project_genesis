  # ============================================================================
  # QDRANT VECTOR DATABASE
  # ============================================================================
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    networks:
      - microservices-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  microservices-network:
    driver: bridge
    name: mailautomation-network

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  qdrant_data:
    driver: local
    name: mailautomation-qdrant-data
  sentence_transformers_cache:
    driver: local
    name: mailautomation-transformers-cache
