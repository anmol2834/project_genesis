    container_name: user-service
    ports:
      - "8002:8002"
    volumes:
      - ./shared:/app/shared:ro
      - ./.env:/app/.env:ro
    environment:
      - PYTHONPATH=/app
    networks:
      - microservices-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

