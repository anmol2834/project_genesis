services:

  # ============================================================================
  # GATEWAY SERVICE — Port 8000
  # ============================================================================
  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    image: project-genesis-gateway:latest
    pull_policy: build
    container_name: gateway-service
    ports:
      - "8000:8000"
    volumes:
      - ./shared:/app/shared:ro
      - ./.env:/app/.env:ro
    environment:
      - PYTHONPATH=/app
    networks:
      - microservices-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============================================================================
  # AUTH SERVICE — Port 8001
  # ============================================================================
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    image: project-genesis-auth:latest
    pull_policy: build
    container_name: auth-service
    ports:
      - "8001:8001"
    volumes:
      - ./shared:/app/shared:ro
      - ./.env:/app/.env:ro
      - sentence_transformers_cache:/root/.cache/torch/sentence_transformers
    environment:
      - PYTHONPATH=/app
    networks:
      - microservices-network
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================================
  # AUTH CELERY WORKER
  # Reuses the same image as auth-service — no separate build, just different command
  # ============================================================================
  auth-celery-worker:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    image: project-genesis-auth:latest
    pull_policy: build
    container_name: auth-celery-worker
    working_dir: /app/services/auth-service
    command: celery -A celery_worker worker --loglevel=info --concurrency=4 --pool=solo
    volumes:
      - ./shared:/app/shared:ro
      - ./.env:/app/.env:ro
      - sentence_transformers_cache:/root/.cache/torch/sentence_transformers
    environment:
      - PYTHONPATH=/app
      - C_FORCE_ROOT=true
    networks:
      - microservices-network
    depends_on:
      auth-service:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================================
  # USER SERVICE — Port 8002
  # ============================================================================
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    image: project-genesis-user:latest
